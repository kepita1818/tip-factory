services:
  - type: web
    name: tip-factory
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_FOOTBALL_KEY
        value: 650c819e61df3915394dd45ba62df836
