services:
  - type: web
    name: tipfactory
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: FOOTBALLDATA_IO_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
