services:
  - type: web
    name: tip-factory
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_FOOTBALL_KEY
        sync: false
      - key: PORT
        value: 8000
      - key: RENDER
        value: "true"
      - key: DAILY_API_LIMIT
        value: "7500"
    # Keep-alive para evitar que Render duerma la app
    healthCheckPath: /health
    # Auto-deploy al hacer push
    autoDeploy: true

  - type: cron
    name: tip-factory-precache
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from app import precache_daily_data; precache_daily_data()"
    schedule: "0 6,18 * * *"
    envVars:
      - key: API_FOOTBALL_KEY
        sync: false
      - key: DAILY_API_LIMIT
        value: "7500"
