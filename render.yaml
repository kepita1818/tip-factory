services:
  - type: web
    name: tip-factory
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_FOOTBALL_KEY
        sync: false
      - key: PORT
        value: 8000
      - key: RENDER
        value: "true"
      - key: DAILY_API_LIMIT
        value: "7500"  # Free tier API-Football = 100/día. Cambiar a 7500 para Pro tier.
      # Para mantener despierto en free tier:
      # 1. Self-ping interno (ya activado en código)
      # 2. UptimeRobot: https://uptimerobot.com (gratis, ping cada 5 min)
      #    Añade monitor HTTP: https://tu-app.onrender.com/ping
      # 3. cron-job.org: https://cron-job.org (gratis, ping cada 14 min)
      #    URL: https://tu-app.onrender.com/ping

  - type: cron
    name: tip-factory-precache
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from app import precache_daily_data; precache_daily_data()"
    schedule: "0 6,18 * * *"  # 6am y 6pm UTC
    envVars:
      - key: API_FOOTBALL_KEY
        sync: false
      - key: DAILY_API_LIMIT
        value: "7500"
