services:
  - type: web
    name: tip-factory
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_FOOTBALL_KEY
        sync: false
      - key: PORT
        value: 8000
      - key: RENDER
        value: "true"
      # Para mantener despierto en free tier:
      # 1. Self-ping interno (automático)
      # 2. UptimeRobot: https://uptimerobot.com (gratis, ping cada 5 min)
      # 3. cron-job.org: https://cron-job.org (gratis, ping cada 14 min)
      # Endpoint a pingear: https://tu-app.onrender.com/ping

  - type: cron
    name: tip-factory-precache
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from app import precache_daily_data; precache_daily_data()"
    schedule: "0 6,18 * * *"  # 6am y 6pm UTC
    envVars:
      - key: API_FOOTBALL_KEY
        sync: false
